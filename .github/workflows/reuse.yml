name: REUSE Compliance Check

on: [push, pull_request]

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v1
        with:
          args: spdx -o zephyr.spdx

      - name: upload-results
        uses: actions/upload-artifact@master
        continue-on-error: True
        with:
          name: zephyr.spdx
          path: zephyr.spdx

