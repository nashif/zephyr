sample:
  name: Process Model - Isolation
  description: >
    Demonstrates two independently isolated processes running concurrently.
    Each process lives in its own memory domain; hardware memory protection
    prevents one from accessing the other's data.  Both processes receive a
    pointer to a shared read-only message channel (a kernel message queue)
    so they can output results without sharing writable state.

common:
  tags:
    - process
    - llext
    - userspace
  min_ram: 96
  min_flash: 192
  integration_platforms:
    - qemu_cortex_a9
    - qemu_cortex_r5
    - mps2/an385
    - mps2/an521/cpu0

tests:
  sample.process.isolation:
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "Process A: counter=.*"
        - "Process B: counter=.*"
        - "All processes finished"
