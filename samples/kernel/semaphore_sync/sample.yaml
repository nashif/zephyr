sample:
  description: >
    Mirrors samples/kernel/completion using semaphores, showing
    where the two primitives behave differently.
  name: Semaphore Sync Sample
tests:
  sample.kernel.semaphore_sync:
    tags:
      - kernel
      - synchronization
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "worker: starting long computation"
        - "worker: computation done, giving semaphore"
        - "main: computation result ready"
        - "worker: task 1 done"
        - "worker: task 2 done"
        - "worker: task 3 done"
        - "main: all tasks done"
